<!DOCTYPE html>
<html lang="id">
<head>
  <!-- META ANTI-CACHE: Memaksa browser HP selalu memuat pesan terbaru -->
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
  <meta http-equiv="Pragma" content="no-cache">
  <meta http-equiv="Expires" content="0">

  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta charset="UTF-8">
  <title>Chat App</title>

  <style>
    body {
      font-family: Arial, sans-serif;
      background-image: url('https://unsplash.com');
      background-size: cover;
      background-position: center;
      background-repeat: no-repeat;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      margin: 0;
      padding: 10px;
      box-sizing: border-box;
    }

    .chat-box {
      width: 450px;       
      height: 80vh;       
      max-height: 700px;  
      background: rgba(255, 255, 255, 0.95); 
      border-radius: 15px;
      box-shadow: 0 10px 25px rgba(0,0,0,0.3);
      display: flex;
      flex-direction: column; 
      overflow: hidden;
    }

    .header {
      background: #1877f2;
      color: white;
      padding: 15px;
      font-size: 20px;
      font-weight: bold;
      flex-shrink: 0;
    }

    #username {
      margin: 10px;
      padding: 12px;
      border: 1px solid #ddd;
      border-radius: 10px;
      font-size: 14px;
      flex-shrink: 0;
    }

    #messages {
      flex: 1;            
      overflow-y: auto;
      padding: 15px;
      background: #f0f2f5;
    }

    .message {
      background: #000000;              
      color: #ffffff;                   
      padding: 10px 12px;
      margin: 8px 0;
      border-radius: 12px;
      box-shadow: 0 1px 2px rgba(255,255,255,0.1); 
      display: flex;
      justify-content: space-between;
      align-items: center;
      max-width: 85%;    
      width: fit-content;
    }

    .message-content {
      flex: 1;
      word-break: break-word;
      font-size: 14px;
    }

    .message-content img, 
    .message-content video {
      max-width: 100%;    
      width: 200px;
      height: auto;
      border-radius: 8px;
      margin-top: 5px;
      display: block;
    }

    .btn-delete {
      background: none;
      border: none;
      cursor: pointer;
      font-size: 14px;
      padding: 0 5px;
      margin-left: 10px;
      opacity: 0.6;
      transition: opacity 0.2s;
    }

    .btn-delete:hover {
      opacity: 1;
    }

    .input-area {
      display: flex;
      padding: 12px;
      gap: 8px;
      background: white;
      align-items: center;
      flex-shrink: 0;
      border-top: 1px solid #eee;
    }

    #msg {
      flex: 1;
      padding: 12px 15px;
      border: 1px solid #ddd;
      border-radius: 20px;
      font-size: 14px;
      outline: none;
    }

    #msg:focus {
      border-color: #1877f2;
    }

    button {
      background: #1877f2;
      color: white;
      border: none;
      padding: 12px 18px;
      border-radius: 20px;
      cursor: pointer;
      font-size: 14px;
      font-weight: bold;
    }

    .btn-attach {
      background: #e4e6eb;
      color: #050505;
      font-size: 18px;
      padding: 10px 14px;
      border-radius: 50%; 
    }

    /* ==========================================
       KODE KHUSUS UNTUK HP (LAYAR KECIL < 600px)
       ========================================== */
    @media (max-width: 600px) {
      body {
        padding: 0; 
      }

      .chat-box {
        width: 100%;       
        height: 100vh;     
        max-height: 100vh;
        border-radius: 0;  
      }

      .header {
        padding: 12px 15px;
        font-size: 18px;
      }

      #messages {
        padding: 10px;     
      }

      .message {
        max-width: 90%;    
      }

      .message-content img, 
      .message-content video {
        width: 160px;      
      }

      .input-area {
        padding: 8px 10px; 
        padding-bottom: env(safe-area-inset-bottom, 10px); 
      }
      
      #msg, button, .btn-attach {
        font-size: 16px;   
      }
    }
  </style>
</head>
<body>

  <div class="chat-box">
    <div class="header">
      💬 Chat App
    </div>

    <input
      id="username"
      placeholder="Username"
      oninput="renderDeleteButtons()"
    >

    <div id="messages"></div>

    <div class="input-area">
      <input type="file" id="file-input" accept="image/*,video/*" style="display: none;" onchange="handleFileSelect()">
      
      <button class="btn-attach" onclick="document.getElementById('file-input').click()">📎</button>

      <input
        id="msg"
        placeholder="Ketik pesan..."
        autocomplete="off"
      >

      <button onclick="sendMsg()">
        ➤
      </button>
    </div>
  </div>

  <!-- SCRIPT KONEKSI -->
  <script src="/socket.io/socket.io.js"></script>
  <script>
    // Konfigurasi Socket agar memaksa HP terhubung ulang secara agresif
    const socket = io({
      reconnection: true,
      reconnectionAttempts: Infinity,
      reconnectionDelay: 1000,
      reconnectionDelayMax: 5000,
      randomizationFactor: 0.5
    });

    // Fungsi memuat ulang pesan dari server database
    function fetchAllMessages() {
      document.getElementById('messages').innerHTML = ""; // Bersihkan kontainer sebelum memuat ulang
      fetch('/messages')
        .then(res => res.json())
        .then(messages => {
          messages.forEach(data => {
            appendMessageElement(data);
          });
          scrollToBottom();
          renderDeleteButtons();
        })
        .catch(err => console.error("Gagal mengambil pesan:", err));
    }

    // Ambil data pertama kali dibuka
    fetchAllMessages();

    // PERBAIKAN HP 1: Jika browser HP sempat mati/tertidur, ambil ulang pesan otomatis saat tab dibuka kembali
    document.addEventListener('visibilitychange', () => {
      if (document.visibilityState === 'visible') {
        if (!socket.connected) {
          socket.connect(); // Paksa koneksi aktif kembali jika terputus
        }
        fetchAllMessages(); // Ambil pesan terbaru yang tertinggal saat layar mati
      }
    });

    // PERBAIKAN HP 2: Ambil ulang pesan otomatis ketika jaringan HP terputus lalu tersambung lagi
    socket.on('connect', () => {
      console.log("Terhubung ke server chat!");
      fetchAllMessages();
    });

    function appendMessageElement(data) {
      // Mencegah duplikasi elemen jika id pesan sudah ada di layar
      if (document.getElementById(`msg-${data._id}`)) return;

      let div = document.createElement('div');
      div.className = "message";
      div.setAttribute('id', `msg-${data._id}`);
      div.setAttribute('data-sender', data.username);

      let contentSpan = document.createElement('span');
      contentSpan.className = "message-content";
      
      let htmlContent = `<b>${data.username}:</b> `;
      if (data.message) {
        htmlContent += `${data.message}`;
      }

      if (data.fileUrl) {
        if (data.message) htmlContent += `<br>`;
        if (data.fileType === 'video') {
          htmlContent += `<video src="${data.fileUrl}" controls style="max-width: 200px; border-radius: 10px; margin-top: 5px;"></video>`;
        } else {
          htmlContent += `<img src="${data.fileUrl}" style="max-width: 200px; border-radius: 10px; margin-top: 5px;" alt="Media">`;
        }
      }
      
      contentSpan.innerHTML = htmlContent;
      div.appendChild(contentSpan);

      let currentUsername = document.getElementById('username').value.trim();
      if (currentUsername && data.username === currentUsername) {
        let deleteBtn = document.createElement('button');
        deleteBtn.className = "btn-delete";
        deleteBtn.innerHTML = "🗑️";
        deleteBtn.onclick = function() {
          emitDelete(data._id, data.username);
        };
        div.appendChild(deleteBtn);
      }

      document.getElementById('messages').appendChild(div);
    }

    function sendMsg() {
      let username = document.getElementById('username').value.trim();
      let msg = document.getElementById('msg').value.trim();

      if(username === "") {
        alert("Isi username terlebih dahulu");
        return;
      }
      if(msg === "") return;

      socket.emit('chat message', {
        username: username,
        message: msg
      });

      document.getElementById('msg').value = "";
    }

    // PERBAIKAN HP 3: Mengirim pesan lewat keyboard HP menggunakan tombol Enter / Go
    document.getElementById('msg').addEventListener('keypress', function(e) {
      if (e.key === 'Enter') {
        sendMsg();
      }
    });

    function handleFileSelect() {
      let fileInput = document.getElementById('file-input');
      let username = document.getElementById('username').value.trim();

      if (username === "") {
        alert("Isi username terlebih dahulu sebelum memilih file");
        fileInput.value = "";
        return;
      }
      if (fileInput.files.length === 0) return;

      let file = fileInput.files[0];
      let formData = new FormData();
      formData.append('mediaFile', file);

      document.getElementById('msg').placeholder = "Sedang mengunggah... ⏳";
      document.getElementById('msg').disabled = true;

      fetch('/upload', {
        method: 'POST',
        body: formData
      })
      .then(res => res.json())
      .then(result => {
        document.getElementById('msg').placeholder = "Ketik pesan...";
        document.getElementById('msg').disabled = false;
        
        if(result.fileUrl) {
          socket.emit('chat message', {
            username: username,
            message: "", 
            fileUrl: result.fileUrl,
            fileType: result.fileType
          });
        }
        fileInput.value = ""; 
      })
      .catch(err => {
        console.error(err);
        document.getElementById('msg').placeholder = "Ketik pesan...";
        document.getElementById('msg').disabled = false;
        alert("Gagal mengunggah media.");
        fileInput.value = "";
      });
    }

    socket.on('chat message', (data) => {
      appendMessageElement(data);
      scrollToBottom();
    });

    function emitDelete(messageId, username) {
      if(confirm("Apakah Anda yakin ingin menghapus pesan ini?")) {
        socket.emit('delete message', { messageId, username });
      }
    }

    socket.on('message deleted', (messageId) => {
      let msgElement = document.getElementById(`msg-${messageId}`);
      if (msgElement) {
        msgElement.remove();
      }
    });

    function renderDeleteButtons() {
      let currentUsername = document.getElementById('username').value.trim();
      let allMessages = document.querySelectorAll('.message');

      allMessages.forEach(msgDiv => {
        let sender = msgDiv.getAttribute('data-sender');
        let existingBtn = msgDiv.querySelector('.btn-delete');
        let messageId = msgDiv.getAttribute('id').replace('msg-', '');

        if (currentUsername && sender === currentUsername) {
          if (!existingBtn) {
            let deleteBtn = document.createElement('button');
            deleteBtn.className = "btn-delete";
            deleteBtn.innerHTML = "🗑️";
            deleteBtn.onclick = function() {
              emitDelete(messageId, sender);
            };
            msgDiv.appendChild(deleteBtn);
          }
        } else {
          if (existingBtn) existingBtn.remove();
        }
      });
    }

    function scrollToBottom() {
      let msgBox = document.getElementById('messages');
      msgBox.scrollTop = msgBox.scrollHeight;
    }
  </script>
</body>
</html>
